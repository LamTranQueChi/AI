<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Đăng ký</title>

    <link rel="stylesheet"
          href="../css/dang-ky.css">
</head>
<body>
    <div class="xacthuc-wrapper">
        <div class="xacthuc-box register-box">
            <form>
                <h2>CCR</h2>
                <h3>Tạo tài khoản</h3>

                <input type="text"
                    placeholder="Họ và tên"
                    required>

                <input type="email"
                    placeholder="Email"
                    required>

                <input type="password"
                    placeholder="Mật khẩu"
                    required>

                <input type="password"
                    placeholder="Nhập lại mật khẩu"
                    required>

                <div class="gender">
                    <label>
                        <input type="radio"
                            name="gender">
                        Nam
                    </label>

                    <label>
                        <input type="radio"
                            name="gender">
                        Nữ
                    </label>
                </div>

                <textarea rows="4"
                        placeholder="Giới thiệu bản thân"></textarea>

                <button type="submit"
                        class="xacthuc-btn">
                    Đăng ký
                </button>

                <p class="bottom-text">

                    Đã có tài khoản?

                    <a href="dang-nhap.html">
                        Đăng nhập
                    </a>

                </p>
            </form>
        </div>
    </div>

<script src="../js/dang-ky.js"></script>
</body>
</html>
