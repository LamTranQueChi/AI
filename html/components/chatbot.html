<!-- Floating AI Button -->
<div id="chatFloatingBtn">

    <span class="material-symbols-outlined">
        smart_toy
    </span>

</div>

<!-- Chat Panel -->
<div id="chatPanel" class="hidden-chat">

    <!-- Header -->
    <div class="chat-header">

        <div class="flex items-center gap-2">

            <span class="material-symbols-outlined">
                smart_toy
            </span>

            <div>

                <h3>AI Public Assistant</h3>

                <p>Đang hoạt động</p>

            </div>

        </div>

        <button id="closeChat">

            <span class="material-symbols-outlined">
                close
            </span>

        </button>

    </div>

    <!-- Nội dung -->
    <div class="chat-body">

        <div class="bot-message">

            Xin chào 👋 Tôi có thể hỗ trợ gì cho bạn?

        </div>

    </div>

    <!-- Footer -->
    <div class="chat-footer">

        <!-- Đính kèm -->
        <button id="attachBtn" class="chat-icon-btn" type="button">
            <span class="material-symbols-outlined">attach_file</span>
        </button>

        <input
            id="chatInput"
            type="text"
            placeholder="Nhập câu hỏi...">

        <button id="voiceBtn" class="chat-icon-btn" type="button">
            <span class="material-symbols-outlined">keyboard_voice</span>
        </button>

        <button id="sendBtn" class="send-btn" type="button">
            <span class="material-symbols-outlined">send</span>
        </button>

    </div>

</div>
